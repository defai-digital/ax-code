name: ax-code-tui-renderer

on:
  workflow_dispatch:
    inputs:
      timeout_ms:
        description: TUI startup timeout in milliseconds
        required: false
        type: string
        default: "20000"
      run_pty:
        description: Run the installed package under a PTY until OpenTUI mounts
        required: false
        type: boolean
        default: true
      require_ready:
        description: Fail the workflow when the source package TUI gate is not ready
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  source-package-tui:
    runs-on: ubuntu-latest
    env:
      AX_CODE_DISABLE_SHARE: "true"
      AX_CODE_INSTALL_SMOKE_TEMP_ROOT: .tmp/source-install-smoke
    steps:
      - name: Validate workflow_dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if ! [[ "${{ inputs.timeout_ms }}" =~ ^[1-9][0-9]*$ ]]; then
            echo "FAIL: timeout_ms must be a positive integer milliseconds value, got '${{ inputs.timeout_ms }}'"
            exit 1
          fi

          case "${{ inputs.run_pty }}" in
            true|false) ;;
            *)
              echo "FAIL: run_pty must be true or false"
              exit 1
              ;;
          esac

          case "${{ inputs.require_ready }}" in
            true|false) ;;
            *)
              echo "FAIL: require_ready must be true or false"
              exit 1
              ;;
          esac

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Evaluate source package TUI startup gate
        id: source-package-tui
        continue-on-error: ${{ !inputs.require_ready }}
        shell: bash
        working-directory: packages/ax-code
        run: |
          set -euo pipefail

          if [ "${{ inputs.run_pty }}" = "true" ]; then
            AX_CODE_INSTALL_SMOKE_TUI_TIMEOUT_MS="${{ inputs.timeout_ms }}" \
              bun run script/source-install-smoke.ts --tui-startup-smoke --keep-temp
          else
            bun run script/source-install-smoke.ts --keep-temp
          fi

      - name: Upload source package TUI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ax-code-source-package-tui
          path: packages/ax-code/.tmp/source-install-smoke/
          if-no-files-found: ignore
