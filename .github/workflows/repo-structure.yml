name: repo-structure

on:
  pull_request:
    paths:
      - ".github/workflows/repo-structure.yml"
      - ".github/**"
      - ".internal/**"
      - "ax-internal/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "crates/**"
      - "script/**"
      - "docs/**"
      - "desktop/**"
      - "packages/**"
      - "tools/**"
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/repo-structure.yml"
      - ".github/**"
      - ".internal/**"
      - "ax-internal/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "crates/**"
      - "script/**"
      - "docs/**"
      - "desktop/**"
      - "packages/**"
      - "tools/**"
  schedule:
    - cron: "17 9 * * 1"
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint GitHub workflows
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Test repository scripts
        run: pnpm run test:scripts

      - name: Check repo structure
        run: pnpm run check:structure

      - name: Run ax-code self-scan
        run: pnpm run check:self-scan -- --report .internal/reports/self-scan.md

      - name: Upload ax-code self-scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-self-scan
          path: .internal/reports/self-scan.md
          if-no-files-found: ignore

      - name: Ensure internal planning files are not tracked
        run: |
          tracked_internal="$(git ls-files .internal ax-internal | tr '\n' ' ')"
          if [ -n "$tracked_internal" ]; then
            echo "Error: internal planning files are tracked and must stay local-only."
            echo "Tracked files:"
            git ls-files .internal ax-internal
            exit 1
          fi

      # ax-code intentionally does not track or display monetary cost for
      # LLM calls. This guard prevents schema fields, identifiers, or slash
      # commands from quietly reintroducing a cost meter.
      - name: Check no cost meter
        run: pnpm run check:no-cost

      - name: Check OpenAPI snapshot
        run: pnpm run check:openapi
