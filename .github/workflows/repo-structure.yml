name: repo-structure

on:
  pull_request:
    paths:
      - ".github/workflows/repo-structure.yml"
      - ".internal/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "crates/**"
      - "script/**"
      - "scripts/**"
      - "docs/**"
      - "github/**"
      - "packages/**"
      - "sdks/**"
      - "planning/**"
      - "tools/**"
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/repo-structure.yml"
      - ".internal/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "crates/**"
      - "script/**"
      - "scripts/**"
      - "docs/**"
      - "github/**"
      - "packages/**"
      - "sdks/**"
      - "planning/**"
      - "tools/**"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check repo structure
        run: pnpm run check:structure

      - name: Ensure .internal is not tracked
        run: |
          tracked_internal="$(git ls-files .internal | tr '\n' ' ')"
          if [ -n "$tracked_internal" ]; then
            echo "Error: .internal is tracked and must stay local-only."
            echo "Tracked files:"
            git ls-files .internal
            exit 1
          fi

      # ax-code intentionally does not track or display monetary cost for
      # LLM calls. This guard prevents schema fields, identifiers, or slash
      # commands from quietly reintroducing a cost meter.
      - name: Check no cost meter
        run: pnpm run check:no-cost

      - name: Check OpenAPI snapshot
        run: pnpm run check:openapi
