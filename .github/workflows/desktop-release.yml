name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop version to release, for example 1.3.0"
        required: true
        type: string
      dry_run:
        description: "Run release build without publishing assets"
        required: false
        default: false
        type: boolean

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  AX_CODE_DISABLE_SHARE: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check Desktop boundaries
        run: pnpm run check:desktop-boundaries:strict

      - name: Check Desktop IPC contracts
        run: pnpm run check:desktop-ipc-contracts

      - name: Check Desktop endpoint contracts
        run: pnpm run check:desktop-endpoint-contracts

      - name: Check Desktop package test scripts
        run: pnpm run check:desktop-package-tests

      - name: Validate Desktop docs
        run: node desktop/scripts/docs/validate-docs.mjs

      - name: Typecheck Desktop
        run: pnpm run desktop:typecheck

      - name: Lint Desktop
        run: pnpm run desktop:lint

      - name: Test Desktop
        run: pnpm run desktop:test

      - name: Build Desktop
        run: pnpm run desktop:build

  create-release:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/desktop-v* ]]; then
            version="${GITHUB_REF#refs/tags/desktop-v}"
          else
            echo "::error::Desktop release version is required"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v$version" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const changelog = fs.readFileSync('desktop/CHANGELOG.md', 'utf8');
          const section = changelog.split(/^## /m).find((part) => part.startsWith(`[${version}]`));
          if (!section) throw new Error(`desktop/CHANGELOG.md is missing [${version}]`);
          fs.mkdirSync('artifacts', { recursive: true });
          fs.writeFileSync('artifacts/desktop-release-notes.md', `## ${section}`.trim() + '\n');
          NODE

      - name: Require an absent or draft release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$IS_DRAFT" != "true" ]; then
              echo "::error::release $TAG is already published; refusing to replace verified assets"
              exit 1
            fi
            echo "Continuing existing draft release $TAG"
          fi

      - name: Create draft GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: false
          body_path: artifacts/desktop-release-notes.md
          name: v${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-web:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --dir packages/sdk/js run build

      - name: Build web package
        run: pnpm run desktop:build

      - name: Pack web runtime
        working-directory: desktop/packages/web
        run: |
          set -euo pipefail
          npm pack
          tarball="$(find . -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$tarball"
          mv "$tarball" "ax-code-web-${{ needs.create-release.outputs.version }}.tgz"

      - name: Upload web tarball
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: desktop/packages/web/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --dir packages/sdk/js run build

      - name: Require Apple signing and notarization credentials
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_TEAM_ID APPLE_API_KEY_B64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for signed macOS Desktop releases"
              exit 1
            fi
          done

      - name: Install Apple certificate
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/electron-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # Notarize via the App Store Connect API key (not Apple ID + app password).
      # electron-builder reads APPLE_API_KEY (path) / APPLE_API_KEY_ID /
      # APPLE_API_ISSUER. Exported via GITHUB_ENV after the required-secret gate.
      - name: Configure Apple API key for notarization
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/apple-api-key.p8"
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          {
            echo "APPLE_API_KEY=$KEY_PATH"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Build macOS Electron app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ELECTRON_BUILDER_ARCH: arm64
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.HAS_APPLE_CERT }}
        run: |
          set -euo pipefail
          pnpm --filter @ax-code/electron run build
          node desktop/packages/electron/scripts/package.mjs --mac --arm64 --publish=never

      # electron-builder notarizes + staples the .app (and .zip), but not the
      # .dmg wrapper. Notarize the dmg itself and staple so it passes Gatekeeper
      # offline / before mounting.
      - name: Notarize and staple the dmg
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG="$(ls desktop/packages/electron/dist/*.dmg)"
          xcrun notarytool submit "$DMG" --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl --assess --type install --verbose=2 "$DMG"

          APP="$(find desktop/packages/electron/dist -maxdepth 2 -type d -name 'AX Code.app' -print -quit)"
          test -n "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          SIGNATURE_DETAILS="$(codesign -dv --verbose=4 "$APP" 2>&1)"
          printf '%s\n' "$SIGNATURE_DETAILS"
          grep -F "Authority=Developer ID Application: DEFAI PRIVATE LIMITED" <<< "$SIGNATURE_DETAILS"
          grep -F "TeamIdentifier=${APPLE_TEAM_ID}" <<< "$SIGNATURE_DETAILS"
          spctl --assess --type execute --verbose=2 "$APP"

      - name: Packaged app smoke
        run: node desktop/packages/electron/scripts/smoke-packaged-app.mjs --artifacts "$RUNNER_TEMP/desktop-smoke"

      - name: Upload macOS smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-smoke-logs-macos-arm64
          path: ${{ runner.temp }}/desktop-smoke
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload macOS assets
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/packages/electron/dist/*.dmg
            desktop/packages/electron/dist/*.zip
            desktop/packages/electron/dist/*.blockmap
            desktop/packages/electron/dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Windows x64 (Intel/AMD). The arm64 sibling is build-windows-arm64 below;
  # each arch builds on its own runner so native modules compile for the target.
  build-windows:
    needs: create-release
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        shell: bash
        # Keep root lifecycle scripts disabled on Windows. The workspace includes
        # the CLI/TUI node-pty-prebuilt-multiarch dependency, which has no Node
        # 24 Windows prebuild and fails native compilation before Desktop build
        # steps run. Electron native modules are rebuilt explicitly later.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build SDK
        shell: bash
        run: pnpm --dir packages/sdk/js run build

      - name: Set up AzureSignTool
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $toolDirectory = Join-Path $env:RUNNER_TEMP "azuresigntool"
          dotnet tool install AzureSignTool --tool-path $toolDirectory --version 7.0.1
          $tool = Join-Path $toolDirectory "AzureSignTool.exe"
          if (-not (Test-Path $tool)) { throw "AzureSignTool not found at $tool" }
          "AZURE_SIGNTOOL_PATH=$tool" | Out-File $env:GITHUB_ENV -Append

      - name: Build Windows Electron app
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_KEY_VAULT_URL: https://keyvault-defai.vault.azure.net
          AZURE_KEY_VAULT_CERTIFICATE: cert-defai
          WINDOWS_CERTIFICATE_SHA1: FC40F1109912C025E751E804AA9BD1538A2D12EF
          WINDOWS_SIGNING_REQUIRED: "true"
        run: |
          set -euo pipefail
          pnpm --filter @ax-code/electron run build
          node desktop/packages/electron/scripts/package.mjs --win --x64 --publish=never

      - name: Upload Windows x64 installers
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/packages/electron/dist/*.exe
            desktop/packages/electron/dist/*.zip
            desktop/packages/electron/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Both Windows jobs emit a file literally named "latest.yml"; uploading
      # both to the release would clobber. Keep it as an arch-tagged CI artifact
      # and merge into one manifest later (see merge-windows-latest-yml).
      - name: Upload Windows x64 update manifest
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: latest-yml-x86_64-pc-windows-msvc
          path: desktop/packages/electron/dist/latest.yml
          if-no-files-found: error

  build-windows-arm64:
    needs: create-release
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        shell: bash
        # Keep root lifecycle scripts disabled on Windows. The workspace includes
        # the CLI/TUI node-pty-prebuilt-multiarch dependency, which has no Node
        # 24 Windows prebuild and fails native compilation before Desktop build
        # steps run. Electron native modules are rebuilt explicitly later.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build SDK
        shell: bash
        run: pnpm --dir packages/sdk/js run build

      - name: Set up AzureSignTool
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $toolDirectory = Join-Path $env:RUNNER_TEMP "azuresigntool"
          dotnet tool install AzureSignTool --tool-path $toolDirectory --version 7.0.1
          $tool = Join-Path $toolDirectory "AzureSignTool.exe"
          if (-not (Test-Path $tool)) { throw "AzureSignTool not found at $tool" }
          "AZURE_SIGNTOOL_PATH=$tool" | Out-File $env:GITHUB_ENV -Append

      - name: Build Windows Electron app
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_KEY_VAULT_URL: https://keyvault-defai.vault.azure.net
          AZURE_KEY_VAULT_CERTIFICATE: cert-defai
          WINDOWS_CERTIFICATE_SHA1: FC40F1109912C025E751E804AA9BD1538A2D12EF
          WINDOWS_SIGNING_REQUIRED: "true"
        run: |
          set -euo pipefail
          pnpm --filter @ax-code/electron run build
          node desktop/packages/electron/scripts/package.mjs --win --arm64 --publish=never

      - name: Upload Windows arm64 installers
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/packages/electron/dist/*.exe
            desktop/packages/electron/dist/*.zip
            desktop/packages/electron/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows arm64 update manifest
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: latest-yml-aarch64-pc-windows-msvc
          path: desktop/packages/electron/dist/latest.yml
          if-no-files-found: error

  merge-windows-latest-yml:
    needs: [create-release, build-windows, build-windows-arm64]
    if: >-
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.create-release.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-windows-arm64.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download per-arch Windows update manifests
        uses: actions/download-artifact@v8
        with:
          path: win-latest-yml
          pattern: latest-yml-*-pc-windows-msvc

      - name: Merge per-arch latest.yml into one manifest
        env:
          LATEST_YML_DIR: win-latest-yml
          AX_CODE_DESKTOP_VERSION: ${{ needs.create-release.outputs.version }}
        run: node desktop/packages/electron/scripts/finalize-windows-latest-yml.mjs

      - name: Upload merged latest.yml to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: gh release upload "$TAG" --repo "$REPOSITORY" --clobber "$RUNNER_TEMP/latest.yml"

  sign-release-assets:
    needs: [create-release, package-web, build-macos, build-windows, build-windows-arm64, merge-windows-latest-yml]
    if: >-
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.create-release.result == 'success' &&
      needs.package-web.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-windows-arm64.result == 'success' &&
      needs.merge-windows-latest-yml.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p release-assets
          gh release download "$TAG" --repo "$REPOSITORY" --dir release-assets --clobber
          cp install.ps1 release-assets/install.ps1

      - name: Sign release assets
        env:
          AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64: ${{ secrets.AX_CODE_MINISIGN_SECRET_KEY_B64 || secrets.AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64 }}
          AX_CODE_DESKTOP_MINISIGN_PASSWORD: ${{ secrets.AX_CODE_MINISIGN_PASSWORD || secrets.AX_CODE_DESKTOP_MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          SECRET_KEY="$RUNNER_TEMP/ax.minisign.key"
          PUBLIC_KEY="$RUNNER_TEMP/ax.pub"
          cp docs/release/ax-minisign.pub "$PUBLIC_KEY"
          if [ -z "$AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64" ] || [ -z "$AX_CODE_DESKTOP_MINISIGN_PASSWORD" ]; then
            echo "::error::Desktop minisign secrets are required to publish signed release assets. Configure AX_CODE_DESKTOP_MINISIGN_* or AX_CODE_MINISIGN_*."
            exit 1
          fi
          printf '%s' "$AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64" | base64 -d > "$SECRET_KEY"
          chmod 600 "$SECRET_KEY"
          assets=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.minisig|*.sig|*/ax-minisign.pub) ;;
              *) assets+=("$file") ;;
            esac
          done < <(find release-assets -type f -print0)
          ./desktop/scripts/minisign-artifacts.sh --secret-key "$SECRET_KEY" --public-key "$PUBLIC_KEY" --force "${assets[@]}"

      - name: Upload minisign signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          uploads=(release-assets/install.ps1 docs/release/ax-minisign.pub)
          signatures=()
          test -f release-assets/install.ps1
          while IFS= read -r -d '' file; do signatures+=("$file"); done < <(find release-assets -type f -name '*.minisig' -print0)
          test "${#signatures[@]}" -gt 0
          gh release upload "$TAG" --repo "$REPOSITORY" --clobber "${uploads[@]}" "${signatures[@]}"

  verify-release-assets:
    needs: [create-release, sign-release-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Verify uploaded Minisign coverage and signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "$TAG" --repo "$REPOSITORY" --dir release-assets --clobber
          cmp docs/release/ax-minisign.pub release-assets/ax-minisign.pub

          verified=0
          while IFS= read -r -d '' asset; do
            case "$(basename "$asset")" in
              *.minisig|*.sig|ax-minisign.pub) continue ;;
            esac
            signature="${asset}.minisig"
            test -f "$signature"
            minisign -V -p docs/release/ax-minisign.pub -m "$asset" -x "$signature"
            verified=$((verified + 1))
          done < <(find release-assets -type f -print0)
          test "$verified" -gt 0

  finalize-release:
    needs:
      [
        create-release,
        package-web,
        build-macos,
        build-windows,
        build-windows-arm64,
        merge-windows-latest-yml,
        sign-release-assets,
        verify-release-assets,
      ]
    if: >-
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.create-release.result == 'success' &&
      needs.package-web.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-windows-arm64.result == 'success' &&
      needs.merge-windows-latest-yml.result == 'success' &&
      needs.sign-release-assets.result == 'success' &&
      needs.verify-release-assets.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [ "$IS_DRAFT" != "true" ]; then
            echo "::error::release $TAG is no longer a draft; refusing to publish or mutate it"
            exit 1
          fi
          gh release edit "$TAG" --draft=false

  # Generate winget Desktop manifests from published NSIS installers and attach
  # them to the desktop-v* release for microsoft/winget-pkgs submission.
  winget-manifests:
    needs: [create-release, finalize-release]
    if: >-
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.finalize-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - run: pnpm install --frozen-lockfile

      - name: Generate Desktop winget manifests
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          pnpm exec tsx tools/winget/generate-manifests.ts \
            --version "$VERSION" \
            --package desktop \
            --tag "$TAG" \
            --out "$RUNNER_TEMP/winget"
          (cd "$RUNNER_TEMP/winget" && zip -r "$RUNNER_TEMP/winget-desktop-manifests-${TAG}.zip" manifests)
          echo "WINGET_ZIP=$RUNNER_TEMP/winget-desktop-manifests-${TAG}.zip" >> "$GITHUB_ENV"

      - name: Upload winget manifests to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" "$WINGET_ZIP" --clobber

      - name: Upload winget manifests artifact
        uses: actions/upload-artifact@v7
        with:
          name: winget-desktop-manifests
          path: ${{ env.WINGET_ZIP }}
          if-no-files-found: error
          retention-days: 30

  update-homebrew-tap:
    needs: [create-release, finalize-release]
    if: >-
      always() &&
      needs.finalize-release.result == 'success'
    runs-on: ubuntu-latest
    env:
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}

      - name: Skip Homebrew update when token is absent
        if: ${{ env.HAS_TAP_TOKEN != 'true' }}
        run: echo "::notice::HOMEBREW_TAP_TOKEN not configured; skipping Desktop Homebrew cask update."

      - name: Download and verify release DMG
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y minisign
          curl --fail --location --no-progress-meter --retry 6 --retry-all-errors --retry-delay 10 \
            --output release.dmg \
            "https://github.com/defai-digital/ax-code/releases/download/${TAG}/AX-Code-${VERSION}-mac-arm64.dmg"
          curl --fail --location --no-progress-meter --retry 6 --retry-all-errors --retry-delay 10 \
            --output release.dmg.minisig \
            "https://github.com/defai-digital/ax-code/releases/download/${TAG}/AX-Code-${VERSION}-mac-arm64.dmg.minisig"
          minisign -V -p docs/release/ax-minisign.pub -m release.dmg -x release.dmg.minisig
          echo "DMG_SHA256=$(sha256sum release.dmg | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Push updated Desktop cask
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/defai-digital/homebrew-ax-code-desktop.git" homebrew-tap
          cd homebrew-tap
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const tag = process.env.TAG;
          const sha256 = process.env.DMG_SHA256;
          // The Desktop cask token must not collide with the `ax-code` CLI
          // formula: Homebrew skips linking a formula whenever an installed
          // cask shares its token, so formula upgrades left `ax-code` missing
          // from PATH entirely (issue #342). The cask ships as
          // "ax-code-desktop"; cask_renames.json migrates installs of the
          // short-lived "ax-code" cask token on their next brew upgrade.
          const cask = [
            'cask "ax-code-desktop" do',
            `  version "${version}"`,
            `  sha256 "${sha256}"`,
            '',
            `  url "https://github.com/defai-digital/ax-code/releases/download/${tag}/AX-Code-#{version}-mac-arm64.dmg"`,
            '  name "AX Code Desktop"',
            '  desc "AI coding assistant desktop app powered by AX Code"',
            '  homepage "https://github.com/defai-digital/ax-code"',
            '',
            '  app "AX Code.app"',
            '',
            '  zap trash: [',
            '    "~/Library/Application Support/AX Code Desktop",',
            '    "~/Library/Preferences/ai.defai.ax-code-app.plist",',
            '    "~/Library/Caches/AX Code Desktop",',
            '    "~/Library/Logs/AX Code Desktop",',
            '  ]',
            'end',
            '',
          ].join('\n');
          fs.mkdirSync('Casks', { recursive: true });
          fs.writeFileSync('Casks/ax-code-desktop.rb', cask);
          fs.rmSync('Casks/ax-code.rb', { force: true });
          fs.writeFileSync('cask_renames.json', JSON.stringify({ "ax-code": "ax-code-desktop" }, null, 2) + '\n');
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Casks cask_renames.json
          git diff --cached --quiet && echo "No cask changes to commit." && exit 0
          git commit -m "Update ax-code desktop cask to ${VERSION}"
          git push
