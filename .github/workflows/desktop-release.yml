name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop version to release, for example 1.3.0"
        required: true
        type: string
      dry_run:
        description: "Run release build without publishing assets"
        required: false
        default: false
        type: boolean

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  AX_CODE_DISABLE_SHARE: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check Desktop boundaries
        run: pnpm run check:desktop-boundaries:strict

      - name: Check Desktop IPC contracts
        run: pnpm run check:desktop-ipc-contracts

      - name: Check Desktop endpoint contracts
        run: pnpm run check:desktop-endpoint-contracts

      - name: Check Desktop package test scripts
        run: pnpm run check:desktop-package-tests

      - name: Validate Desktop docs
        run: node desktop/scripts/docs/validate-docs.mjs

      - name: Typecheck Desktop
        run: pnpm run desktop:typecheck

      - name: Lint Desktop
        run: pnpm run desktop:lint

      - name: Test Desktop
        run: pnpm run desktop:test

      - name: Build Desktop
        run: pnpm run desktop:build

  create-release:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/desktop-v* ]]; then
            version="${GITHUB_REF#refs/tags/desktop-v}"
          else
            echo "::error::Desktop release version is required"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v$version" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const changelog = fs.readFileSync('desktop/CHANGELOG.md', 'utf8');
          const section = changelog.split(/^## /m).find((part) => part.startsWith(`[${version}]`));
          if (!section) throw new Error(`desktop/CHANGELOG.md is missing [${version}]`);
          fs.mkdirSync('artifacts', { recursive: true });
          fs.writeFileSync('artifacts/desktop-release-notes.md', `## ${section}`.trim() + '\n');
          NODE

      - name: Create draft GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: false
          body_path: artifacts/desktop-release-notes.md
          name: AX Code Desktop ${{ steps.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-web:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --dir packages/sdk/js run build

      - name: Build web package
        run: pnpm run desktop:build

      - name: Pack web runtime
        working-directory: desktop/packages/web
        run: |
          set -euo pipefail
          npm pack
          tarball="$(find . -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$tarball"
          mv "$tarball" "ax-code-web-${{ needs.create-release.outputs.version }}.tgz"

      - name: Upload web tarball
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: desktop/packages/web/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --dir packages/sdk/js run build

      - name: Install Apple certificate
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/electron-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # Notarize via the App Store Connect API key (not Apple ID + app password).
      # electron-builder reads APPLE_API_KEY (path) / APPLE_API_KEY_ID /
      # APPLE_API_ISSUER. Exported via GITHUB_ENV so they are set ONLY when a
      # cert is configured — otherwise electron-builder would error on a partial
      # API-key config instead of building unsigned.
      - name: Configure Apple API key for notarization
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/apple-api-key.p8"
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          {
            echo "APPLE_API_KEY=$KEY_PATH"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Build macOS Electron app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ELECTRON_BUILDER_ARCH: arm64
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.HAS_APPLE_CERT }}
        run: |
          set -euo pipefail
          if [ "$HAS_APPLE_CERT" != "true" ]; then
            echo "::warning::No Apple signing certificate configured; building unsigned macOS artifacts."
          fi
          pnpm --filter @ax-code/electron run build
          node desktop/packages/electron/scripts/package.mjs --mac --arm64 --publish=never

      # electron-builder notarizes + staples the .app (and .zip), but not the
      # .dmg wrapper. Notarize the dmg itself and staple so it passes Gatekeeper
      # offline / before mounting.
      - name: Notarize and staple the dmg
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        run: |
          set -euo pipefail
          DMG="$(ls desktop/packages/electron/dist/*.dmg)"
          xcrun notarytool submit "$DMG" --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Packaged app smoke
        run: node desktop/packages/electron/scripts/smoke-packaged-app.mjs --artifacts "$RUNNER_TEMP/desktop-smoke"

      - name: Upload macOS smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-smoke-logs-macos-arm64
          path: ${{ runner.temp }}/desktop-smoke
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload macOS assets
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/packages/electron/dist/*.dmg
            desktop/packages/electron/dist/*.zip
            desktop/packages/electron/dist/*.blockmap
            desktop/packages/electron/dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Windows x64 (Intel/AMD). The arm64 sibling is build-windows-arm64 below;
  # each arch builds on its own runner so native modules compile for the target.
  build-windows:
    needs: create-release
    runs-on: windows-2022
    env:
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        shell: bash
        run: pnpm --dir packages/sdk/js run build

      - name: Set up nuget
        if: ${{ env.HAS_AZURE_SIGNING == 'true' }}
        uses: nuget/setup-nuget@v2

      - name: Set up Azure Trusted Signing tools
        if: ${{ env.HAS_AZURE_SIGNING == 'true' }}
        shell: pwsh
        env:
          ARCH: ${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}
        run: |
          $ErrorActionPreference = "Stop"
          $tools = Join-Path $env:RUNNER_TEMP "ts-tools"
          # Omit -Version to take latest stable; pin once a build is verified.
          nuget install Microsoft.Trusted.Signing.Client -ExcludeVersion -OutputDirectory $tools
          nuget install Microsoft.Windows.SDK.BuildTools -ExcludeVersion -OutputDirectory $tools
          $dlib = Join-Path $tools "Microsoft.Trusted.Signing.Client/bin/$env:ARCH/Azure.CodeSigning.Dlib.dll"
          $signtool = Get-ChildItem (Join-Path $tools "Microsoft.Windows.SDK.BuildTools/bin") -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\$env:ARCH\\" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not (Test-Path $dlib)) { throw "Azure dlib not found at $dlib" }
          if (-not $signtool) { throw "signtool.exe not found for $env:ARCH" }
          "AZURE_CODESIGNING_DLIB=$dlib" | Out-File $env:GITHUB_ENV -Append
          "SIGNTOOL_PATH=$signtool"      | Out-File $env:GITHUB_ENV -Append

      - name: Build Windows Electron app
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
        run: |
          set -euo pipefail
          if [ "${HAS_AZURE_SIGNING:-}" != "true" ]; then
            echo "::warning::No Azure Trusted Signing configured; building unsigned Windows artifacts."
          fi
          pnpm --filter @ax-code/electron run build
          node desktop/packages/electron/scripts/package.mjs --win --x64 --publish=never

      - name: Upload Windows x64 installers
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/packages/electron/dist/*.exe
            desktop/packages/electron/dist/*.zip
            desktop/packages/electron/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Both Windows jobs emit a file literally named "latest.yml"; uploading
      # both to the release would clobber. Keep it as an arch-tagged CI artifact
      # and merge into one manifest later (see merge-windows-latest-yml).
      - name: Upload Windows x64 update manifest
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: latest-yml-x86_64-pc-windows-msvc
          path: desktop/packages/electron/dist/latest.yml
          if-no-files-found: error

  build-windows-arm64:
    needs: create-release
    runs-on: windows-11-arm
    env:
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        shell: bash
        run: pnpm --dir packages/sdk/js run build

      - name: Set up nuget
        if: ${{ env.HAS_AZURE_SIGNING == 'true' }}
        uses: nuget/setup-nuget@v2

      - name: Set up Azure Trusted Signing tools
        if: ${{ env.HAS_AZURE_SIGNING == 'true' }}
        shell: pwsh
        env:
          ARCH: ${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}
        run: |
          $ErrorActionPreference = "Stop"
          $tools = Join-Path $env:RUNNER_TEMP "ts-tools"
          # Omit -Version to take latest stable; pin once a build is verified.
          nuget install Microsoft.Trusted.Signing.Client -ExcludeVersion -OutputDirectory $tools
          nuget install Microsoft.Windows.SDK.BuildTools -ExcludeVersion -OutputDirectory $tools
          $dlib = Join-Path $tools "Microsoft.Trusted.Signing.Client/bin/$env:ARCH/Azure.CodeSigning.Dlib.dll"
          $signtool = Get-ChildItem (Join-Path $tools "Microsoft.Windows.SDK.BuildTools/bin") -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\$env:ARCH\\" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not (Test-Path $dlib)) { throw "Azure dlib not found at $dlib" }
          if (-not $signtool) { throw "signtool.exe not found for $env:ARCH" }
          "AZURE_CODESIGNING_DLIB=$dlib" | Out-File $env:GITHUB_ENV -Append
          "SIGNTOOL_PATH=$signtool"      | Out-File $env:GITHUB_ENV -Append

      - name: Build Windows Electron app
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
        run: |
          set -euo pipefail
          if [ "${HAS_AZURE_SIGNING:-}" != "true" ]; then
            echo "::warning::No Azure Trusted Signing configured; building unsigned Windows artifacts."
          fi
          pnpm --filter @ax-code/electron run build
          node desktop/packages/electron/scripts/package.mjs --win --arm64 --publish=never

      - name: Upload Windows arm64 installers
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/packages/electron/dist/*.exe
            desktop/packages/electron/dist/*.zip
            desktop/packages/electron/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows arm64 update manifest
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: latest-yml-aarch64-pc-windows-msvc
          path: desktop/packages/electron/dist/latest.yml
          if-no-files-found: error

  merge-windows-latest-yml:
    needs: [create-release, build-windows, build-windows-arm64]
    if: >-
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.create-release.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-windows-arm64.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download per-arch Windows update manifests
        uses: actions/download-artifact@v7
        with:
          path: win-latest-yml
          pattern: latest-yml-*-pc-windows-msvc

      - name: Merge per-arch latest.yml into one manifest
        env:
          LATEST_YML_DIR: win-latest-yml
          AX_CODE_DESKTOP_VERSION: ${{ needs.create-release.outputs.version }}
        run: node desktop/packages/electron/scripts/finalize-windows-latest-yml.mjs

      - name: Upload merged latest.yml to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: gh release upload "$TAG" --repo "$REPOSITORY" --clobber "$RUNNER_TEMP/latest.yml"

  sign-release-assets:
    needs: [create-release, package-web, build-macos, build-windows, build-windows-arm64, merge-windows-latest-yml]
    if: >-
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.create-release.result == 'success' &&
      needs.package-web.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-windows-arm64.result == 'success' &&
      needs.merge-windows-latest-yml.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p release-assets
          gh release download "$TAG" --repo "$REPOSITORY" --dir release-assets --clobber

      - name: Sign release assets
        env:
          AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64: ${{ secrets.AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64 || secrets.AX_CODE_MINISIGN_SECRET_KEY_B64 }}
          AX_CODE_DESKTOP_MINISIGN_PASSWORD: ${{ secrets.AX_CODE_DESKTOP_MINISIGN_PASSWORD || secrets.AX_CODE_MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          SECRET_KEY="$RUNNER_TEMP/ax-code-desktop.minisign.key"
          PUBLIC_KEY="$RUNNER_TEMP/ax-code-desktop.minisign.pub"
          cat > "$PUBLIC_KEY" <<'EOF'
          untrusted comment: minisign public key 5B7AB63CD6D674BE
          RWS+dNbWPLZ6W9TH486c9zdH84NiiuFnm4VpVTRlXoMHClyQx/fY7W2A
          EOF
          if [ -z "$AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64" ] || [ -z "$AX_CODE_DESKTOP_MINISIGN_PASSWORD" ]; then
            echo "::error::Desktop minisign secrets are required to publish signed release assets. Configure AX_CODE_DESKTOP_MINISIGN_* or AX_CODE_MINISIGN_*."
            exit 1
          fi
          printf '%s' "$AX_CODE_DESKTOP_MINISIGN_SECRET_KEY_B64" | base64 -d > "$SECRET_KEY"
          chmod 600 "$SECRET_KEY"
          assets=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.minisig|*.sig) ;;
              *) assets+=("$file") ;;
            esac
          done < <(find release-assets -type f -print0)
          ./desktop/scripts/minisign-artifacts.sh --secret-key "$SECRET_KEY" --public-key "$PUBLIC_KEY" --force "${assets[@]}"

      - name: Upload minisign signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          signatures=()
          while IFS= read -r -d '' file; do signatures+=("$file"); done < <(find release-assets -type f -name '*.minisig' -print0)
          test "${#signatures[@]}" -gt 0
          gh release upload "$TAG" --repo "$REPOSITORY" --clobber "${signatures[@]}"

  finalize-release:
    needs:
      [
        create-release,
        package-web,
        build-macos,
        build-windows,
        build-windows-arm64,
        merge-windows-latest-yml,
        sign-release-assets,
      ]
    if: >-
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.create-release.result == 'success' &&
      needs.package-web.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-windows-arm64.result == 'success' &&
      needs.merge-windows-latest-yml.result == 'success' &&
      needs.sign-release-assets.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    needs: [create-release, finalize-release]
    if: >-
      always() &&
      needs.finalize-release.result == 'success'
    runs-on: ubuntu-latest
    env:
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Skip Homebrew update when token is absent
        if: ${{ env.HAS_TAP_TOKEN != 'true' }}
        run: echo "::notice::HOMEBREW_TAP_TOKEN not configured; skipping Desktop Homebrew cask update."

      - name: Download release DMG
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          curl -fsSL -o release.dmg \
            "https://github.com/defai-digital/ax-code/releases/download/${TAG}/AX-Code-${VERSION}-mac-arm64.dmg"
          echo "DMG_SHA256=$(sha256sum release.dmg | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Push updated Desktop cask
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/defai-digital/homebrew-ax-code-desktop.git" homebrew-tap
          cd homebrew-tap
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const tag = process.env.TAG;
          const sha256 = process.env.DMG_SHA256;
          const sharedLines = [
            `  version "${version}"`,
            `  sha256 "${sha256}"`,
            '',
            `  url "https://github.com/defai-digital/ax-code/releases/download/${tag}/AX-Code-#{version}-mac-arm64.dmg"`,
            '  name "AX Code Desktop"',
            '  desc "AI coding assistant desktop app powered by AX Code"',
            '  homepage "https://github.com/defai-digital/ax-code"',
            '',
            '  app "AX Code.app"',
            '',
            '  postflight do',
            '    system_command "/usr/bin/xattr",',
            '      args: ["-cr", "#{appdir}/AX Code.app"]',
            '  end',
            '',
            '  zap trash: [',
            '    "~/Library/Application Support/AX Code Desktop",',
