name: ax-code

on:
  pull_request:
    paths:
      - ".github/workflows/ax-code-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "packages/ax-code/**"
      - "packages/opentui-core/**"
      - "crates/**"
      - "packages/sdk/**"
      - "packages/util/**"
      - "packages/plugin/**"
      - "packages/script/**"
      - "script/**"
      - "desktop/**"
  push:
    branches:
      - dev
      - main
    paths:
      - ".github/workflows/ax-code-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "packages/ax-code/**"
      - "packages/opentui-core/**"
      - "crates/**"
      - "packages/sdk/**"
      - "packages/util/**"
      - "packages/plugin/**"
      - "packages/script/**"
      - "script/**"
      - "desktop/**"
  workflow_dispatch:
    inputs:
      live:
        description: Run live ax-code tests
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  actions: read

jobs:
  deterministic:
    runs-on: ubuntu-latest
    env:
      AX_CODE_DISABLE_SHARE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Validate workflow_dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          case "${{ inputs.live }}" in
            true|false) ;;
            *)
              echo "FAIL: live must be true or false"
              exit 1
              ;;
          esac

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Security scan
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=table

      - name: Build SDK
        run: pnpm --dir packages/sdk/js run build

      - name: Verify generated SDK artifacts are current
        shell: bash
        run: |
          drift="$(git status --porcelain=v1 --untracked-files=all -- \
            packages/sdk/openapi.json \
            packages/sdk/js/src/gen \
            packages/sdk/js/src/v2/gen)"
          if [ -n "$drift" ]; then
            echo "Generated SDK artifacts are stale. Run: pnpm --dir packages/sdk/js run build"
            printf '%s\n' "$drift"
            exit 1
          fi

      - name: Test SDK
        run: pnpm --dir packages/sdk/js test

      - name: Test repository scripts
        run: pnpm run test:scripts

      - name: Build Plugin
        run: pnpm --dir packages/plugin run build

      - name: Typecheck ax-code
        run: pnpm --dir packages/ax-code run typecheck

      - name: Download coverage baseline
        if: always() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          dest="packages/ax-code/.tmp/coverage-baseline"
          mkdir -p "$dest"

          run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ax-code-ci.yml/runs?branch=${GITHUB_REF_NAME}&event=push&status=completed&per_page=50" \
              --jq '.workflow_runs[] | select(.conclusion=="success") | .id' \
              | head -n1
          )"

          if [ -z "$run_id" ]; then
            echo "No successful ${GITHUB_REF_NAME} coverage baseline found; this run will establish it."
            exit 0
          fi

          gh run download "$run_id" -n ax-code-coverage-baseline-summary -D "$dest"
          baseline="$(find "$dest" -name '*.json' -print -quit)"
          if [ -z "$baseline" ]; then
            echo "Coverage baseline artifact from run $run_id contained no JSON summary."
            exit 1
          fi
          find "$dest" -maxdepth 2 -type f -print

      - name: Run deterministic ax-code tests
        shell: bash
        run: |
          set -euo pipefail

          cmd=(
            pnpm
            --dir
            packages/ax-code
            run
            test:ci
            --
            deterministic
          )

          # Full V8 coverage is retained on post-merge dev pushes, where it
          # produces the baseline artifact. Running it on every PR keeps
          # hundreds of instrumented test files in memory and makes feedback
          # unacceptably slow.
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            export NODE_OPTIONS="--max-old-space-size=12288"
            export AX_TEST_MAX_WORKERS="1"
            export AX_TEST_SHARD_SIZE="25"
            cmd+=(
              --coverage
              --coverage-dir
              .tmp/coverage
              --coverage-summary-out
              .tmp/coverage-summary.json
              --coverage-report-out
              .tmp/coverage-report.md
            )

            baseline="$(find packages/ax-code/.tmp/coverage-baseline -name '*.json' | head -n1 || true)"
            if [ -n "$baseline" ]; then
              cmd+=(--coverage-baseline "${baseline#packages/ax-code/}")
            fi
          fi

          "${cmd[@]}"

      - name: Summarize ax-code risk map
        if: always()
        run: pnpm --dir packages/ax-code run test:risk

      - name: Upload deterministic reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-deterministic-report
          path: |
            packages/ax-code/.tmp/test-report/*.xml
            packages/ax-code/.tmp/test-risk.md
          if-no-files-found: ignore

      - name: Upload coverage artifacts
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-coverage-report
          path: |
            packages/ax-code/.tmp/coverage/lcov.info
            packages/ax-code/.tmp/coverage-summary.json
            packages/ax-code/.tmp/coverage-report.md
          if-no-files-found: ignore

      - name: Upload coverage baseline summary
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-coverage-baseline-summary
          path: packages/ax-code/.tmp/coverage-summary.json
          if-no-files-found: ignore

  live:
    if: github.event_name == 'workflow_dispatch' && inputs.live
    runs-on: ubuntu-latest
    env:
      AX_CODE_DISABLE_SHARE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm exec tsc
        working-directory: packages/sdk/js

      - name: Build Plugin
        run: pnpm --dir packages/plugin run build

      - name: Run live ax-code tests
        run: pnpm --dir packages/ax-code run test:ci -- live

      - name: Upload live reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-live-report
          path: packages/ax-code/.tmp/test-report/*.xml
          if-no-files-found: ignore

  tui-node26-smoke:
    runs-on: ubuntu-latest
    env:
      AX_CODE_DISABLE_SHARE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "26"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --dir packages/sdk/js run build

      - name: Install source launcher
        run: AX_CODE_BIN_DIR="$GITHUB_WORKSPACE/.tmp/tui-smoke-bin" pnpm run setup:cli -- --source

      - name: TUI startup smoke
        run: pnpm --dir packages/ax-code run tui:startup-smoke -- --bin "$GITHUB_WORKSPACE/.tmp/tui-smoke-bin/ax-code"
