name: ax-code

on:
  pull_request:
    paths:
      - ".github/workflows/ax-code-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "packages/ax-code/**"
      - "packages/opentui-core/**"
      - "packages/ax-code-render-native/**"
      - "crates/**"
      - "packages/sdk/**"
      - "packages/util/**"
      - "packages/plugin/**"
      - "packages/script/**"
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/ax-code-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "packages/ax-code/**"
      - "packages/opentui-core/**"
      - "packages/ax-code-render-native/**"
      - "crates/**"
      - "packages/sdk/**"
      - "packages/util/**"
      - "packages/plugin/**"
      - "packages/script/**"
  workflow_dispatch:
    inputs:
      live:
        description: Run live ax-code tests
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  deterministic:
    runs-on: ubuntu-latest
    env:
      AX_CODE_DISABLE_SHARE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Validate workflow_dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          case "${{ inputs.live }}" in
            true|false) ;;
            *)
              echo "FAIL: live must be true or false"
              exit 1
              ;;
          esac

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Security scan
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=table

      - name: Build SDK
        run: pnpm exec tsc
        working-directory: packages/sdk/js

      - name: Build Plugin
        run: pnpm --dir packages/plugin run build

      - name: Typecheck ax-code
        run: pnpm --dir packages/ax-code run typecheck

      - name: Download coverage baseline
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          dest="packages/ax-code/.tmp/coverage-baseline"
          mkdir -p "$dest"

          run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ax-code-ci.yml/runs?branch=dev&event=push&status=completed&per_page=50" \
              --jq '.workflow_runs[] | select(.conclusion=="success") | .id' \
              | head -n1
          )"

          if [ -z "$run_id" ]; then
            echo "No successful dev coverage baseline found."
            exit 0
          fi

          gh run download "$run_id" -n ax-code-coverage-baseline-summary -D "$dest" || true
          find "$dest" -maxdepth 2 -type f -print || true

      - name: Run deterministic ax-code tests
        shell: bash
        run: |
          set -euo pipefail

          cmd=(
            pnpm
            --dir
            packages/ax-code
            run
            test:ci
            --
            deterministic
            --rerun-on-fail
            1
            --coverage
            --coverage-dir
            .tmp/coverage
            --coverage-summary-out
            .tmp/coverage-summary.json
            --coverage-report-out
            .tmp/coverage-report.md
          )

          baseline="$(find packages/ax-code/.tmp/coverage-baseline -name '*.json' | head -n1 || true)"
          if [ -n "$baseline" ]; then
            cmd+=(--coverage-baseline "${baseline#packages/ax-code/}")
          fi

          "${cmd[@]}"

      - name: Summarize ax-code risk map
        if: always()
        run: pnpm --dir packages/ax-code run test:risk

      - name: Upload deterministic reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-deterministic-report
          path: |
            packages/ax-code/.tmp/test-report/*.xml
            packages/ax-code/.tmp/test-risk.md
          if-no-files-found: ignore

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-coverage-report
          path: |
            packages/ax-code/.tmp/coverage/lcov.info
            packages/ax-code/.tmp/coverage-summary.json
            packages/ax-code/.tmp/coverage-report.md
          if-no-files-found: ignore

      - name: Upload coverage baseline summary
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-coverage-baseline-summary
          path: packages/ax-code/.tmp/coverage-summary.json
          if-no-files-found: ignore

  # ADR-046: the Rust render core must stay byte-equivalent to the bundled Zig
  # library. Runs on Node 26 (node:ffi) with the repo rust-toolchain; the
  # deterministic job stays on Node 24 and skips these paths.
  native-render-parity:
    runs-on: ubuntu-latest
    env:
      AX_CODE_DISABLE_SHARE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "26"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build @ax-code/render native addon
        run: pnpm run build:native render

      - name: Golden frames (Zig — off-switch, must byte-match)
        # AX_CODE_NATIVE_RENDER=0 forces the bundled Zig library; this pins the
        # committed goldens to Zig so the Rust-default run below is a real cross-
        # check (both must match the same goldens => Rust == Zig).
        env:
          AX_CODE_NATIVE_RENDER: "0"
        run: pnpm --dir packages/ax-code run check:golden-frames

      - name: Golden frames (Rust FULL render pipeline — default, must byte-match)
        # ADR-046 render-core gate: the render pipeline now routes to the Rust
        # addon BY DEFAULT (no env), so this is the path real users get.
        run: pnpm --dir packages/ax-code run check:golden-frames

      - name: Golden frames (Rust yoga/audio escape hatch, must byte-match)
        env:
          AX_CODE_NATIVE_RENDER_SCOPE: "yoga"
        run: pnpm --dir packages/ax-code run check:golden-frames

      - name: Yoga + unicode parity regression
        run: pnpm --dir packages/ax-code exec vitest run test/cli/tui/native-render-yoga-parity.test.ts

      - name: Unicode parity sweep (deep fuzz)
        run: node --experimental-ffi --disable-warning=ExperimentalWarning packages/ax-code/script/native-render-unicode-parity.mjs --fuzz=20000

      - name: Buffer parity sweep (deep op fuzz)
        run: node --experimental-ffi --disable-warning=ExperimentalWarning packages/ax-code/script/native-render-buffer-parity.mjs --seqs=2000

      - name: Text-buffer parity sweep
        run: node --experimental-ffi --disable-warning=ExperimentalWarning packages/ax-code/script/native-render-text-parity.mjs --seqs=2000

      - name: TextBufferView draw parity sweep
        run: node --experimental-ffi --disable-warning=ExperimentalWarning packages/ax-code/script/native-render-textview-draw-parity.mjs --seqs=2000

  # ADR-046: the release ships @ax-code/render built per platform. The Windows
  # MSVC C++ build of the vendored yoga (build.rs -> cc, C++20) can only be
  # validated on a Windows runner, so gate it on every push — this catches a
  # broken cross-platform build before it reaches a release tag. Matches the
  # release Windows targets (x64 + arm64).
  native-render-build-windows:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-11-arm]
    runs-on: ${{ matrix.os }}
    env:
      AX_CODE_DISABLE_SHARE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "26"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build @ax-code/render native addon (MSVC + vendored yoga C++)
        run: pnpm run build:native render

      - name: Render crate unit tests
        run: cargo test --manifest-path crates/Cargo.toml -p ax-code-render

  live:
    if: github.event_name == 'workflow_dispatch' && inputs.live
    runs-on: ubuntu-latest
    env:
      AX_CODE_DISABLE_SHARE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm exec tsc
        working-directory: packages/sdk/js

      - name: Build Plugin
        run: pnpm --dir packages/plugin run build

      - name: Run live ax-code tests
        run: pnpm --dir packages/ax-code run test:ci -- live

      - name: Upload live reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-live-report
          path: packages/ax-code/.tmp/test-report/*.xml
          if-no-files-found: ignore

  tui-node26-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      AX_CODE_DISABLE_SHARE: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"
          node-version: "26"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --dir packages/sdk/js run build

      - name: Install source launcher
        run: AX_CODE_BIN_DIR="$GITHUB_WORKSPACE/.tmp/tui-smoke-bin" pnpm run setup:cli -- --source

      - name: TUI startup smoke
        run: pnpm --dir packages/ax-code run tui:startup-smoke -- --bin "$GITHUB_WORKSPACE/.tmp/tui-smoke-bin/ax-code"
