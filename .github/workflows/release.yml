name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# Channel policy: stable semver tags (for example `v3.1.4`) create the
# GitHub release on the `latest` channel. Prerelease tags (for example
# `v3.2.0-beta.1`) stay on the `beta` channel. The release workflow publishes
# GitHub release assets and updates the Homebrew tap for stable releases.
# npm distribution is no longer supported.
env:
  AX_CODE_RELEASE_CHANNEL: ${{ contains(github.ref_name, '-') && 'beta' || 'latest' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm exec tsc
        working-directory: packages/sdk/js

      - name: Build Plugin
        run: pnpm --dir packages/plugin run build

      - name: Typecheck
        run: pnpm --dir packages/ax-code run typecheck

      - name: Test
        run: pnpm --dir packages/ax-code run test:ci -- deterministic --rerun-on-fail 1
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          AX_TEST_MAX_WORKERS: "2"
          # The session-heavy deterministic suite can exhaust a 6 GiB Node heap
          # within a 100-file worker group. Keep each fresh Vitest process below
          # that limit while retaining the two-worker cap.
          AX_TEST_SHARD_SIZE: "25"
          AX_CODE_DISABLE_AUTOUPDATE: "1"
          AX_CODE_DISABLE_LSP_DOWNLOAD: "1"
          AX_CODE_DISABLE_MODELS_FETCH: "1"
          AX_CODE_DISABLE_SHARE: "true"

      - name: Upload deterministic test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-deterministic-test-report
          path: .internal/reports/testing/junit/
          if-no-files-found: warn
          retention-days: 14

  build:
    needs: validate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            targets: darwin-arm64
            build-script: script/build-node-tui.ts
            build-args: --release --arch arm64
            smoke-bin: dist/ax-code-darwin-arm64/bin/ax-code
            smoke-runtime: node-bundled
          - os: windows-2022
            targets: win32-x64
            build-script: script/build-node-tui.ts
            build-args: --release --arch x64
            smoke-bin: dist/ax-code-windows-x64/bin/ax-code.cmd
            smoke-runtime: node-bundled
          - os: windows-11-arm
            targets: win32-arm64
            build-script: script/build-node-tui.ts
            build-args: --release --arch arm64
            smoke-bin: dist/ax-code-windows-arm64/bin/ax-code.cmd
            smoke-runtime: node-bundled
    runs-on: ${{ matrix.os }}
    env:
      AX_CODE_DISABLE_AUTOUPDATE: "1"
      AX_CODE_DISABLE_AUTO_INDEX: "1"
      AX_CODE_DISABLE_LSP_DOWNLOAD: "1"
      AX_CODE_DISABLE_MODELS_FETCH: "1"
      AX_CODE_DISABLE_PROJECT_CONFIG: "1"
      HAS_APPLE_CERT: ${{ matrix.targets == 'darwin-arm64' && secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set isolated home paths
        shell: bash
        run: |
          {
            echo "AX_CODE_TEST_HOME=$RUNNER_TEMP/ax-code-release-build-home"
            echo "XDG_CONFIG_HOME=$RUNNER_TEMP/ax-code-release-build-home/.config"
            echo "XDG_CACHE_HOME=$RUNNER_TEMP/ax-code-release-build-home/.cache"
            echo "XDG_DATA_HOME=$RUNNER_TEMP/ax-code-release-build-home/.local/share"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/ax-code-release-build-home/.local/state"
          } >> "$GITHUB_ENV"

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"

      # The build matrix later installs dist runtime dependencies with
      # lifecycle scripts disabled and treats node-pty rebuild as optional.
      # Keep root install the same way here so Windows releases are not blocked
      # by optional native postinstall fallout under new Node/toolchain pairs.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build SDK
        run: pnpm exec tsc
        working-directory: packages/sdk/js

      - name: Build Plugin
        run: pnpm --dir packages/plugin run build

      - name: Require Apple signing and notarization credentials
        if: ${{ matrix.targets == 'darwin-arm64' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_TEAM_ID APPLE_API_KEY_B64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for signed macOS releases"
              exit 1
            fi
          done

      - name: Install Apple certificate
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/ax-code-cli-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in imported Apple certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          if [ -n "${APPLE_TEAM_ID:-}" ] && [[ "$IDENTITY" != *"($APPLE_TEAM_ID)"* ]]; then
            echo "::error::Developer ID identity does not match APPLE_TEAM_ID."
            echo "identity: $IDENTITY"
            exit 1
          fi
          echo "AX_CODE_APPLE_CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      # Notarize via the App Store Connect API key (not Apple ID + app password).
      - name: Configure Apple API key for notarization
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_API_KEY_B64" ] || [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_API_ISSUER" ]; then
            echo "::error::APPLE_API_KEY_B64, APPLE_API_KEY_ID, and APPLE_API_ISSUER are required for macOS CLI notarization."
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/apple-api-key.p8"
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          {
            echo "APPLE_API_KEY=$KEY_PATH"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Build
        working-directory: packages/ax-code
        run: pnpm exec tsx ${{ matrix.build-script }} ${{ matrix.build-args }}
        env:
          AX_CODE_VERSION: ${{ github.ref_name }}
          AX_CODE_CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
          AX_CODE_RELEASE: "true"

      - name: Smoke — release runtime
        working-directory: packages/ax-code
        shell: bash
        run: |
          set -e
          BIN="${{ matrix.smoke-bin }}"
          if [ -z "$BIN" ]; then
            echo "FAIL: release matrix did not provide an ax-code smoke target"
            exit 1
          fi
          if [ ! -f "$BIN" ]; then
            echo "FAIL: ax-code smoke target not found: $BIN"
            exit 1
          fi
          VERSION_OUTPUT="$("$BIN" --version)"
          echo "$VERSION_OUTPUT"
          DOCTOR_OUTPUT="$("$BIN" doctor)"
          echo "$DOCTOR_OUTPUT"
          if ! echo "$DOCTOR_OUTPUT" | grep -E "Runtime: .* \(${{ matrix.smoke-runtime }}\)" >/dev/null; then
            echo "FAIL: release runtime did not report ${{ matrix.smoke-runtime }}"
            exit 1
          fi

      - name: Notarize macOS CLI archive
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        run: |
          set -euo pipefail
          ARCHIVE="packages/ax-code/dist/ax-code-${{ matrix.targets }}.zip"
          if [ ! -f "$ARCHIVE" ]; then
            echo "::error::macOS CLI archive not found: $ARCHIVE"
            exit 1
          fi
          xcrun notarytool submit "$ARCHIVE" --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          echo "macOS CLI ZIP notarized. ZIP archives cannot be stapled; do not modify $ARCHIVE after this step."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.targets }}
          path: packages/ax-code/dist/
          retention-days: 1

  publish:
    needs: build
    # Runs on macOS so minisign can retrieve the signing passphrase from the
    # Apple Keychain instead of a plaintext environment variable. The
    # passphrase is injected into the ephemeral runner's login Keychain at
    # runtime from AX_CODE_MINISIGN_PASSWORD, then removed before the job ends.
    # See sign-release-assets.ts → minisignPasswordFromKeychain.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"

      - run: pnpm install --frozen-lockfile

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages/ax-code/dist/
          merge-multiple: true

      - name: Add PowerShell installer release asset
        run: cp install.ps1 packages/ax-code/dist/install.ps1

      - name: Install minisign
        run: brew install minisign

      - name: Prepare minisign release key
        env:
          AX_CODE_MINISIGN_SECRET_KEY_B64: ${{ secrets.AX_CODE_MINISIGN_SECRET_KEY_B64 }}
          AX_CODE_MINISIGN_PASSWORD: ${{ secrets.AX_CODE_MINISIGN_PASSWORD }}
        run: |
          if [ -z "$AX_CODE_MINISIGN_SECRET_KEY_B64" ]; then
            echo "::error::AX_CODE_MINISIGN_SECRET_KEY_B64 is required to sign release assets"
            exit 1
          fi
          KEY_DIR="$RUNNER_TEMP/ax-code-minisign"
          mkdir -p "$KEY_DIR"
          printf '%s' "$AX_CODE_MINISIGN_SECRET_KEY_B64" | base64 -D > "$KEY_DIR/ax.minisign.key"
          chmod 600 "$KEY_DIR/ax.minisign.key"
          cat > "$KEY_DIR/ax.pub" <<'PUB'
          untrusted comment: minisign public key CF42FC69BEEF0EA5
          RWSlDu++afxCz01OqhYWhfo8+L8pVbSYXJBEb2zoWBuK0WACIzbGVZRO
          PUB
          echo "AX_CODE_MINISIGN_KEY_DIR=$KEY_DIR" >> "$GITHUB_ENV"

          # Store the passphrase in the macOS login Keychain so the signing
          # script retrieves it via `security find-generic-password`. The
          # passphrase never appears in the signing step's environment,
          # reducing exposure in logs and process listings.
          if [ -z "$AX_CODE_MINISIGN_PASSWORD" ]; then
            echo "::error::AX_CODE_MINISIGN_PASSWORD is required to sign release assets"
            exit 1
          fi
          security add-generic-password -U \
            -s ax-minisign \
            -a ax-release \
            -w "$AX_CODE_MINISIGN_PASSWORD"
          echo "Minisign passphrase stored in macOS Keychain (service: ax-minisign, account: ax-release)"

      - name: Sign release assets
        run: |
          # AX_CODE_MINISIGN_PASSWORD is intentionally NOT exported here — the
          # signing script reads the passphrase from the macOS Keychain via
          # minisignPasswordFromKeychain() in sign-release-assets.ts.
          pnpm exec tsx script/sign-release-assets.ts --dist-dir packages/ax-code/dist --secret-key "$AX_CODE_MINISIGN_KEY_DIR/ax.minisign.key" --public-key "$AX_CODE_MINISIGN_KEY_DIR/ax.pub"
          shopt -s nullglob
          signable_assets=(packages/ax-code/dist/install.ps1 packages/ax-code/dist/*.tar.gz packages/ax-code/dist/*.zip)
          for asset in "${signable_assets[@]}"; do
            if [ ! -f "${asset}.minisig" ]; then
              echo "::error::missing minisign signature for ${asset}"
              exit 1
            fi
          done

      - name: Clean up Keychain passphrase
        if: always()
        run: |
          security delete-generic-password -s ax-minisign -a ax-release 2>/dev/null || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_ARGS=()
          if [ "$CHANNEL" != "latest" ]; then
            PRERELEASE_ARGS=(--prerelease)
          fi
          # The release workflow publishes GitHub release assets and updates the
          # Homebrew tap (stable releases, see the homebrew job); npm
          # distribution is no longer supported.
          # Idempotent while the release is still a draft. Never mutate a
          # published release before re-verifying all detached signatures.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            VERSION="${TAG#v}"
            NOTES_FILE=".internal/release/release-notes-v${VERSION}.md"
            if [ -f "$NOTES_FILE" ]; then
              NOTES_ARGS=(--notes-file "$NOTES_FILE")
            else
              NOTES_ARGS=(--generate-notes)
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              "${NOTES_ARGS[@]}" \
              --verify-tag \
              --draft \
              "${PRERELEASE_ARGS[@]}"
          else
            IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [ "$IS_DRAFT" != "true" ]; then
              echo "::error::release $TAG is already published; refusing to replace its assets"
              exit 1
            fi
            echo "Continuing existing draft release $TAG"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          shopt -s nullglob
          files=(docs/release/ax-minisign.pub packages/ax-code/dist/install.ps1 packages/ax-code/dist/install.ps1.minisig packages/ax-code/dist/*.tar.gz packages/ax-code/dist/*.tar.gz.minisig packages/ax-code/dist/*.zip packages/ax-code/dist/*.zip.minisig)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no release assets found to upload"
            exit 1
          fi
          for f in "${files[@]}"; do
            gh release upload "$TAG" "$f" --clobber
          done

      - name: Verify uploaded release signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERIFY_DIR="$RUNNER_TEMP/release-verify"
          mkdir -p "$VERIFY_DIR"
          gh release download "$TAG" --dir "$VERIFY_DIR" --clobber
          cmp docs/release/ax-minisign.pub "$VERIFY_DIR/ax-minisign.pub"

          verified=0
          shopt -s nullglob
          assets=("$VERIFY_DIR/install.ps1" "$VERIFY_DIR"/*.tar.gz "$VERIFY_DIR"/*.zip)
          for asset in "${assets[@]}"; do
            signature="${asset}.minisig"
            test -f "$signature"
            minisign -V -p docs/release/ax-minisign.pub -m "$asset" -x "$signature"
            verified=$((verified + 1))
          done
          test "$verified" -gt 0

      - name: Publish verified release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [ "$IS_DRAFT" != "true" ]; then
            echo "::error::release $TAG is no longer a draft; refusing to publish or mutate it"
            exit 1
          fi
          gh release edit "$TAG" --draft=false

  homebrew:
    # Update the Homebrew tap automatically after a STABLE release. Beta /
    # prerelease tags (those containing a hyphen) skip the stable tap update.
    # Requires HOMEBREW_TAP_TOKEN or TAP_TOKEN to hold a PAT with write access
    # to defai-digital/homebrew-ax-code.
    needs: publish
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: Update Homebrew tap
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          # Read this repo's release assets with the default token. Pass both
          # tap-write secret names so the script can fall back if one is present
          # but lacks access to defai-digital/homebrew-ax-code.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash .github/scripts/update-homebrew.sh

  # Generate winget CLI manifests from published Windows ZIP assets and attach
  # them to the GitHub release for maintainers submitting to winget-pkgs.
  winget-manifests:
    needs: publish
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"

      - run: pnpm install --frozen-lockfile

      - name: Generate CLI winget manifests
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm exec tsx tools/winget/generate-manifests.ts \
            --version "$VERSION" \
            --package cli \
            --tag "v${VERSION}" \
            --out "$RUNNER_TEMP/winget"
          (cd "$RUNNER_TEMP/winget" && zip -r "$RUNNER_TEMP/winget-cli-manifests-v${VERSION}.zip" manifests)
          echo "WINGET_ZIP=$RUNNER_TEMP/winget-cli-manifests-v${VERSION}.zip" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload winget manifests to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "v${VERSION}" "$WINGET_ZIP" --clobber

      - name: Upload winget manifests artifact
        uses: actions/upload-artifact@v7
        with:
          name: winget-cli-manifests
          path: ${{ env.WINGET_ZIP }}
          if-no-files-found: error
          retention-days: 30

  # End-to-end install verification for stable releases only. Homebrew smoke
  # polls for formula convergence; Windows smoke exercises install.ps1 minisign
  # bootstrap (no preinstalled minisign on PATH). Continue when the Homebrew tap
  # update job fails so the Windows channel still gets exercised.
  install-matrix-smoke:
    needs: [publish, homebrew]
    if: >-
      always() &&
      !contains(github.ref_name, '-') &&
      needs.publish.result == 'success'
    uses: ./.github/workflows/install-matrix-smoke.yml
    with:
      version: ${{ github.ref_name }}
      channel: all
    secrets: inherit
