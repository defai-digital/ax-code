name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Channel policy: stable semver tags (for example `v3.1.4`) publish to npm
# `latest`, are marked as the GitHub "Latest" release, and update Homebrew.
# Prerelease tags (for example `v3.2.0-beta.1`) stay on the `beta` channel.
env:
  AX_CODE_RELEASE_CHANNEL: ${{ contains(github.ref_name, '-') && 'beta' || 'latest' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: pnpm install --frozen-lockfile

      - name: Security scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=table

      - name: Typecheck
        run: pnpm --dir packages/ax-code run typecheck

      - name: Test
        run: pnpm --dir packages/ax-code run test:ci -- deterministic
        env:
          AX_CODE_DISABLE_SHARE: "true"

  build:
    needs: typecheck
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: linux-x64
            build-args: --single --baseline --include-abi --skip-install
          - os: ubuntu-24.04-arm
            targets: linux-arm64
            build-args: --single --include-abi --skip-install
          - os: macos-latest
            targets: darwin-arm64
            build-args: --single --skip-install
          - os: windows-latest
            targets: win32-x64
            build-args: --single --skip-install
          - os: windows-11-arm
            targets: win32-arm64
            build-args: --single --skip-install
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/ax-code
        run: bun run script/build.ts ${{ matrix.build-args }}
        env:
          AX_CODE_VERSION: ${{ github.ref_name }}
          AX_CODE_CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
          AX_CODE_RELEASE: "true"

      - name: Smoke — compiled backend stdio handshake
        working-directory: packages/ax-code
        shell: bash
        run: |
          set -e
          BIN="$(find dist -path '*/bin/ax-code*' -type f | head -n 1)"
          if [ -z "$BIN" ]; then
            echo "FAIL: compiled ax-code binary not found under dist/"
            exit 1
          fi
          OUTPUT="$(printf '{"type":"rpc.request","method":"health","id":1}\n' | "$BIN" tui-backend --stdio)"
          echo "$OUTPUT"
          if ! echo "$OUTPUT" | grep -E '"type":"rpc.result".*"id":1' >/dev/null; then
            echo "FAIL: compiled tui-backend did not return an RPC health result"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -E '"runtimeMode":"compiled"' >/dev/null; then
            echo "FAIL: compiled tui-backend did not report compiled runtimeMode"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.targets }}
          path: packages/ax-code/dist/
          retention-days: 1

  publish:
    needs:
      - build
      - publish-source
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages/ax-code/dist/
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
        run: |
          TAG="${{ github.ref_name }}"
          # Idempotent: if the release already exists (e.g. created manually
          # from a release-notes file), skip creation and proceed to upload.
          # Without this step the homebrew job's `gh release download` fails
          # with "release not found" and silently skips the tap update.
          PRERELEASE_FLAG=""
          if [ "$CHANNEL" != "latest" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag \
              $PRERELEASE_FLAG
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for f in packages/ax-code/dist/*.tar.gz packages/ax-code/dist/*.zip; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber || true
          done

  # Source distribution publish — bundled JS + bun runtime. This is the
  # default npm artifact for @defai.digital/ax-code. The legacy
  # @defai.digital/ax-code-source alias is published from the same tarball
  # layout for users who adopted the transitional source package name.
  publish-source:
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: pnpm install --frozen-lockfile

      - name: Build and publish source distribution
        working-directory: packages/ax-code
        run: bun run script/publish-source.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          AX_CODE_VERSION: ${{ github.ref_name }}
          AX_CODE_CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
          AX_CODE_SOURCE_TAG: ${{ env.AX_CODE_RELEASE_CHANNEL }}
          AX_CODE_SOURCE_PACKAGE_NAMES: "@defai.digital/ax-code,@defai.digital/ax-code-source"
          AX_CODE_RELEASE: "true"

  homebrew:
    needs: publish-source
    # Homebrew tracks stable releases only. Prerelease tags still publish to
    # npm/GitHub, but they must not move brew users off the stable line.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/update-homebrew.sh

  # Compatibility Homebrew formula for users who installed ax-code-source
  # during the transitional source-channel rollout. The primary ax-code
  # formula above now uses the same source+bun runtime.
  homebrew-source:
    needs: homebrew
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update Homebrew source formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/update-homebrew-source.sh
