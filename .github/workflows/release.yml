name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# Channel policy: stable semver tags (for example `v3.1.4`) create the
# GitHub release on the `latest` channel. Prerelease tags (for example
# `v3.2.0-beta.1`) stay on the `beta` channel. The release workflow publishes
# GitHub release assets and updates the Homebrew tap for stable releases.
# npm distribution is no longer supported.
env:
  AX_CODE_RELEASE_CHANNEL: ${{ contains(github.ref_name, '-') && 'beta' || 'latest' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm exec tsc
        working-directory: packages/sdk/js

      - name: Build Plugin
        run: pnpm --dir packages/plugin run build

      - name: Typecheck
        run: pnpm --dir packages/ax-code run typecheck

      - name: Test
        run: pnpm --dir packages/ax-code run test:ci -- deterministic --rerun-on-fail 1
        env:
          AX_CODE_DISABLE_AUTOUPDATE: "1"
          AX_CODE_DISABLE_LSP_DOWNLOAD: "1"
          AX_CODE_DISABLE_MODELS_FETCH: "1"
          AX_CODE_DISABLE_SHARE: "true"

      - name: Upload deterministic test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ax-code-deterministic-test-report
          path: packages/ax-code/.tmp/test-report/
          if-no-files-found: warn
          retention-days: 14

  build:
    needs: validate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            targets: darwin-arm64
            build-script: script/build-node-tui.ts
            build-args: --release --arch arm64
            smoke-bin: dist/ax-code-darwin-arm64/bin/ax-code
            smoke-runtime: node-bundled
          - os: windows-2022
            targets: win32-x64
            build-script: script/build-node-tui.ts
            build-args: --release --arch x64
            smoke-bin: dist/ax-code-windows-x64/bin/ax-code.cmd
            smoke-runtime: node-bundled
          - os: windows-11-arm
            targets: win32-arm64
            build-script: script/build-node-tui.ts
            build-args: --release --arch arm64
            smoke-bin: dist/ax-code-windows-arm64/bin/ax-code.cmd
            smoke-runtime: node-bundled
    runs-on: ${{ matrix.os }}
    env:
      AX_CODE_DISABLE_AUTOUPDATE: "1"
      AX_CODE_DISABLE_AUTO_INDEX: "1"
      AX_CODE_DISABLE_LSP_DOWNLOAD: "1"
      AX_CODE_DISABLE_MODELS_FETCH: "1"
      AX_CODE_DISABLE_PROJECT_CONFIG: "1"
      HAS_APPLE_CERT: ${{ matrix.targets == 'darwin-arm64' && secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set isolated home paths
        shell: bash
        run: |
          {
            echo "AX_CODE_TEST_HOME=$RUNNER_TEMP/ax-code-release-build-home"
            echo "XDG_CONFIG_HOME=$RUNNER_TEMP/ax-code-release-build-home/.config"
            echo "XDG_CACHE_HOME=$RUNNER_TEMP/ax-code-release-build-home/.cache"
            echo "XDG_DATA_HOME=$RUNNER_TEMP/ax-code-release-build-home/.local/share"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/ax-code-release-build-home/.local/state"
          } >> "$GITHUB_ENV"

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"

      # The build matrix later installs dist runtime dependencies with
      # lifecycle scripts disabled and treats node-pty rebuild as optional.
      # Keep root install the same way here so Windows releases are not blocked
      # by optional native postinstall fallout under new Node/toolchain pairs.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build SDK
        run: pnpm exec tsc
        working-directory: packages/sdk/js

      - name: Build Plugin
        run: pnpm --dir packages/plugin run build

      - name: Install Apple certificate
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/ax-code-cli-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in imported Apple certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          if [ -n "${APPLE_TEAM_ID:-}" ] && [[ "$IDENTITY" != *"($APPLE_TEAM_ID)"* ]]; then
            echo "::error::Developer ID identity does not match APPLE_TEAM_ID."
            echo "identity: $IDENTITY"
            exit 1
          fi
          echo "AX_CODE_APPLE_CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      # Notarize via the App Store Connect API key (not Apple ID + app password).
      # Exported only when the Apple certificate is configured so fork and local
      # release dry-runs can still produce ad-hoc-signed macOS archives.
      - name: Configure Apple API key for notarization
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_API_KEY_B64" ] || [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_API_ISSUER" ]; then
            echo "::error::APPLE_API_KEY_B64, APPLE_API_KEY_ID, and APPLE_API_ISSUER are required for macOS CLI notarization."
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/apple-api-key.p8"
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          {
            echo "APPLE_API_KEY=$KEY_PATH"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Note unsigned macOS CLI notarization state
        if: ${{ matrix.targets == 'darwin-arm64' && env.HAS_APPLE_CERT != 'true' }}
        run: echo "::warning::No Apple signing certificate configured; macOS CLI archive will use ad-hoc native-library signing and will not be notarized."

      # ADR-046: build the Rust render addon per platform so build-node-tui can
      # ship its .node. Without this the dist has no @ax-code/render binding and
      # the native-render overlay silently falls back to the bundled Zig library.
      # The addon's build.rs compiles the vendored yoga C++ (C++20 via cc), so
      # each runner needs a working C/C++ toolchain (present on the GitHub images).
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build @ax-code/render native addon (napi, host platform)
        run: pnpm run build:native render

      - name: Build
        working-directory: packages/ax-code
        run: pnpm exec tsx ${{ matrix.build-script }} ${{ matrix.build-args }}
        env:
          AX_CODE_VERSION: ${{ github.ref_name }}
          AX_CODE_CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
          AX_CODE_RELEASE: "true"

      # Fail loudly if the render .node was not shipped into the dist — otherwise
      # the native-render overlay would silently fall back to Zig in production.
      - name: Verify render addon shipped
        shell: bash
        run: |
          node_files=$(ls packages/ax-code/dist/ax-code-*/node_modules/@ax-code/render/*.node 2>/dev/null || true)
          if [ -z "$node_files" ]; then
            echo "FAIL: @ax-code/render .node was not shipped into the dist (native-render would fall back to Zig)"
            exit 1
          fi
          echo "OK: render addon shipped:"
          echo "$node_files"

      - name: Smoke — release runtime
        working-directory: packages/ax-code
        shell: bash
        run: |
          set -e
          BIN="${{ matrix.smoke-bin }}"
          if [ -z "$BIN" ]; then
            echo "FAIL: release matrix did not provide an ax-code smoke target"
            exit 1
          fi
          if [ ! -f "$BIN" ]; then
            echo "FAIL: ax-code smoke target not found: $BIN"
            exit 1
          fi
          VERSION_OUTPUT="$("$BIN" --version)"
          echo "$VERSION_OUTPUT"
          DOCTOR_OUTPUT="$("$BIN" doctor)"
          echo "$DOCTOR_OUTPUT"
          if ! echo "$DOCTOR_OUTPUT" | grep -E "Runtime: .* \(${{ matrix.smoke-runtime }}\)" >/dev/null; then
            echo "FAIL: release runtime did not report ${{ matrix.smoke-runtime }}"
            exit 1
          fi

      - name: Notarize macOS CLI archive
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        run: |
          set -euo pipefail
          ARCHIVE="packages/ax-code/dist/ax-code-${{ matrix.targets }}.zip"
          if [ ! -f "$ARCHIVE" ]; then
            echo "::error::macOS CLI archive not found: $ARCHIVE"
            exit 1
          fi
          xcrun notarytool submit "$ARCHIVE" --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          echo "macOS CLI ZIP notarized. ZIP archives cannot be stapled; do not modify $ARCHIVE after this step."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.targets }}
          path: packages/ax-code/dist/
          retention-days: 1

  publish:
    needs: build
    # Runs on macOS so minisign can retrieve the signing passphrase from the
    # Apple Keychain instead of a plaintext environment variable. The
    # passphrase is injected into the ephemeral runner's login Keychain at
    # runtime from AX_CODE_MINISIGN_PASSWORD, then removed before the job ends.
    # See sign-release-assets.ts → minisignPasswordFromKeychain.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Ax-code JS toolchain
        uses: ./.github/actions/setup-ax-code-toolchain
        with:
          checkout: "false"

      - run: pnpm install --frozen-lockfile

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages/ax-code/dist/
          merge-multiple: true

      - name: Install minisign
        run: brew install minisign

      - name: Prepare minisign release key
        env:
          AX_CODE_MINISIGN_SECRET_KEY_B64: ${{ secrets.AX_CODE_MINISIGN_SECRET_KEY_B64 }}
          AX_CODE_MINISIGN_PASSWORD: ${{ secrets.AX_CODE_MINISIGN_PASSWORD }}
        run: |
          if [ -z "$AX_CODE_MINISIGN_SECRET_KEY_B64" ]; then
            echo "::error::AX_CODE_MINISIGN_SECRET_KEY_B64 is required to sign release assets"
            exit 1
          fi
          KEY_DIR="$RUNNER_TEMP/ax-code-minisign"
          mkdir -p "$KEY_DIR"
          printf '%s' "$AX_CODE_MINISIGN_SECRET_KEY_B64" | base64 -D > "$KEY_DIR/minisign.key"
          chmod 600 "$KEY_DIR/minisign.key"
          cat > "$KEY_DIR/minisign.pub" <<'PUB'
          untrusted comment: minisign public key 5B7AB63CD6D674BE
          RWS+dNbWPLZ6W9TH486c9zdH84NiiuFnm4VpVTRlXoMHClyQx/fY7W2A
          PUB
          echo "AX_CODE_MINISIGN_KEY_DIR=$KEY_DIR" >> "$GITHUB_ENV"

          # Store the passphrase in the macOS login Keychain so the signing
          # script retrieves it via `security find-generic-password`. The
          # passphrase never appears in the signing step's environment,
          # reducing exposure in logs and process listings.
          if [ -z "$AX_CODE_MINISIGN_PASSWORD" ]; then
            echo "::error::AX_CODE_MINISIGN_PASSWORD is required to sign release assets"
            exit 1
          fi
          security add-generic-password -U \
            -s ax-code-minisign \
            -a ax-code-release \
            -w "$AX_CODE_MINISIGN_PASSWORD"
          echo "Minisign passphrase stored in macOS Keychain (service: ax-code-minisign, account: ax-code-release)"

      - name: Sign release assets
        run: |
          # AX_CODE_MINISIGN_PASSWORD is intentionally NOT exported here — the
          # signing script reads the passphrase from the macOS Keychain via
          # minisignPasswordFromKeychain() in sign-release-assets.ts.
          pnpm exec tsx script/sign-release-assets.ts --dist-dir packages/ax-code/dist --secret-key "$AX_CODE_MINISIGN_KEY_DIR/minisign.key" --public-key "$AX_CODE_MINISIGN_KEY_DIR/minisign.pub"
          shopt -s nullglob
          archives=(packages/ax-code/dist/*.tar.gz packages/ax-code/dist/*.zip)
          for archive in "${archives[@]}"; do
            if [ ! -f "${archive}.minisig" ]; then
              echo "::error::missing minisign signature for ${archive}"
              exit 1
            fi
          done

      - name: Clean up Keychain passphrase
        if: always()
        run: |
          security delete-generic-password -s ax-code-minisign -a ax-code-release 2>/dev/null || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_ARGS=()
          if [ "$CHANNEL" != "latest" ]; then
            PRERELEASE_ARGS=(--prerelease)
          fi
          # The release workflow publishes GitHub release assets and updates the
          # Homebrew tap (stable releases, see the homebrew job); npm
          # distribution is no longer supported.
          # Idempotent: skip if any release (draft or published) already exists.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            VERSION="${TAG#v}"
            NOTES_FILE="packages/ax-code/.internal/release/release-notes-v${VERSION}.md"
            if [ -f "$NOTES_FILE" ]; then
              NOTES_ARGS=(--notes-file "$NOTES_FILE")
            else
              NOTES_ARGS=(--generate-notes)
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              "${NOTES_ARGS[@]}" \
              --verify-tag \
              "${PRERELEASE_ARGS[@]}"
          else
            gh release edit "$TAG" --draft=false
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          shopt -s nullglob
          files=(packages/ax-code/dist/*.tar.gz packages/ax-code/dist/*.tar.gz.minisig packages/ax-code/dist/*.zip packages/ax-code/dist/*.zip.minisig)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no release assets found to upload"
            exit 1
          fi
          for f in "${files[@]}"; do
            gh release upload "$TAG" "$f" --clobber
          done

  homebrew:
    # Update the Homebrew tap automatically after a STABLE release. Beta /
    # prerelease tags (those containing a hyphen) skip the stable tap update.
    # Requires HOMEBREW_TAP_TOKEN or TAP_TOKEN to hold a PAT with write access
    # to defai-digital/homebrew-ax-code.
    needs: publish
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Update Homebrew tap
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          # Read this repo's release assets with the default token. Pass both
          # tap-write secret names so the script can fall back if one is present
          # but lacks access to defai-digital/homebrew-ax-code.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash .github/scripts/update-homebrew.sh
