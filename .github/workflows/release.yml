name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Channel policy: only the v2.23.x stable series is promoted to npm "latest"
# and tagged as the GitHub "Latest" release. Everything else (v2.24+, v3.x,
# future majors) ships on the "beta" channel until explicitly promoted via
# the "Promote to Stable" workflow.
env:
  AX_CODE_RELEASE_CHANNEL: ${{ startsWith(github.ref_name, 'v2.23.') && 'latest' || 'beta' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: pnpm install --frozen-lockfile

      - name: Security scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=table

      - name: Typecheck
        run: pnpm --dir packages/ax-code run typecheck

      - name: Test
        run: pnpm --dir packages/ax-code run test:ci -- deterministic
        env:
          AX_CODE_DISABLE_SHARE: "true"

  build:
    needs: typecheck
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: linux-x64
            build-args: --single --baseline --include-abi --skip-install
          - os: ubuntu-24.04-arm
            targets: linux-arm64
            build-args: --single --include-abi --skip-install
          - os: macos-latest
            targets: darwin-arm64
            build-args: --single --skip-install
          - os: windows-latest
            targets: win32-x64
            build-args: --single --skip-install
          - os: windows-11-arm
            targets: win32-arm64
            build-args: --single --skip-install
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/ax-code
        run: bun run script/build.ts ${{ matrix.build-args }}
        env:
          AX_CODE_VERSION: ${{ github.ref_name }}
          AX_CODE_CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
          AX_CODE_RELEASE: "true"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.targets }}
          path: packages/ax-code/dist/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: pnpm install --frozen-lockfile

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages/ax-code/dist/
          merge-multiple: true

      - name: Publish to npm
        run: cd packages/ax-code && bun run script/publish.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AX_CODE_VERSION: ${{ github.ref_name }}
          AX_CODE_CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
          AX_CODE_RELEASE: "true"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ env.AX_CODE_RELEASE_CHANNEL }}
        run: |
          TAG="${{ github.ref_name }}"
          # Idempotent: if the release already exists (e.g. created manually
          # from a release-notes file), skip creation and proceed to upload.
          # Without this step the homebrew job's `gh release download` fails
          # with "release not found" and silently skips the tap update.
          PRERELEASE_FLAG=""
          if [ "$CHANNEL" != "latest" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag \
              $PRERELEASE_FLAG
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for f in packages/ax-code/dist/*.tar.gz packages/ax-code/dist/*.zip; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber || true
          done

  homebrew:
    needs: publish
    # Homebrew tap tracks the stable channel only. Beta tags (anything outside
    # the v2.23.x series) build and publish to npm but must not update the
    # tap, otherwise `brew upgrade ax-code` would silently move users off
    # stable.
    if: ${{ startsWith(github.ref_name, 'v2.23.') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/update-homebrew.sh
