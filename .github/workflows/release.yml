name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --dir packages/ax-code run typecheck

      - name: Test
        run: pnpm --dir packages/ax-code run test:ci -- deterministic
        env:
          AX_CODE_DISABLE_SHARE: "true"

  build:
    needs: typecheck
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: linux
          - os: macos-latest
            targets: darwin
          - os: windows-latest
            targets: win32
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/ax-code
        run: bun run script/build.ts --single --skip-install
        env:
          AX_CODE_VERSION: ${{ github.ref_name }}
          AX_CODE_CHANNEL: latest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.targets }}
          path: packages/ax-code/dist/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: pnpm install --frozen-lockfile

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages/ax-code/dist/
          merge-multiple: true

      - name: Publish to npm
        run: cd packages/ax-code && bun run script/publish.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AX_CODE_VERSION: ${{ github.ref_name }}
          AX_CODE_CHANNEL: latest
          AX_CODE_RELEASE: "true"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for f in packages/ax-code/dist/*.tar.gz packages/ax-code/dist/*.zip; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber || true
          done

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          # Download release assets and compute SHA256
          mkdir -p /tmp/assets
          gh release download "$TAG" -D /tmp/assets -p '*.tar.gz' -p '*.zip' || true

          MAC_ARM64_SHA=""
          MAC_X64_SHA=""
          LINUX_ARM64_SHA=""
          LINUX_X64_SHA=""

          [ -f /tmp/assets/ax-code-darwin-arm64.zip ] && MAC_ARM64_SHA=$(sha256sum /tmp/assets/ax-code-darwin-arm64.zip | cut -d' ' -f1)
          [ -f /tmp/assets/ax-code-darwin-x64.zip ] && MAC_X64_SHA=$(sha256sum /tmp/assets/ax-code-darwin-x64.zip | cut -d' ' -f1)
          [ -f /tmp/assets/ax-code-linux-arm64.tar.gz ] && LINUX_ARM64_SHA=$(sha256sum /tmp/assets/ax-code-linux-arm64.tar.gz | cut -d' ' -f1)
          [ -f /tmp/assets/ax-code-linux-x64.tar.gz ] && LINUX_X64_SHA=$(sha256sum /tmp/assets/ax-code-linux-x64.tar.gz | cut -d' ' -f1)

          if [ -z "$MAC_ARM64_SHA" ] || [ -z "$MAC_X64_SHA" ] || [ -z "$LINUX_ARM64_SHA" ] || [ -z "$LINUX_X64_SHA" ]; then
            echo "::warning::Not all platform binaries found, skipping Homebrew update"
            exit 0
          fi

          # Generate formula
          cat > /tmp/ax-code.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          # Auto-generated by release workflow — do not edit manually.
          class AxCode < Formula
            desc "Sovereign AI coding agent — provider-agnostic, LSP-first"
            homepage "https://github.com/defai-digital/ax-code"
            version "${VERSION}"

            depends_on "ripgrep"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/defai-digital/ax-code/releases/download/${TAG}/ax-code-darwin-x64.zip"
                sha256 "${MAC_X64_SHA}"
                def install
                  bin.install "ax-code"
                end
              end
              if Hardware::CPU.arm?
                url "https://github.com/defai-digital/ax-code/releases/download/${TAG}/ax-code-darwin-arm64.zip"
                sha256 "${MAC_ARM64_SHA}"
                def install
                  bin.install "ax-code"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? and Hardware::CPU.is_64_bit?
                url "https://github.com/defai-digital/ax-code/releases/download/${TAG}/ax-code-linux-x64.tar.gz"
                sha256 "${LINUX_X64_SHA}"
                def install
                  bin.install "ax-code"
                end
              end
              if Hardware::CPU.arm? and Hardware::CPU.is_64_bit?
                url "https://github.com/defai-digital/ax-code/releases/download/${TAG}/ax-code-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
                def install
                  bin.install "ax-code"
                end
              end
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/ax-code.rb

          # Push to tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/defai-digital/homebrew-ax-code.git" /tmp/tap
          cp /tmp/ax-code.rb /tmp/tap/ax-code.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ax-code.rb
          git diff --cached --quiet || git commit -m "Update ax-code to v${VERSION}" && git push
