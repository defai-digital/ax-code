name: Install Matrix Smoke

# Validates that ax-code installs and runs end-to-end through supported
# non-npm distribution channels after the release workflow publishes GitHub
# release assets. npm packages and source-bundle aliases are not supported
# install or upgrade channels.
#
# Triggers:
#   - `workflow_dispatch`: maintainers run this manually after GitHub release
#     assets and the Homebrew formula are published.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Already-published version to smoke-test (e.g. 5.3.0)"
        required: true
        type: string
      channel:
        description: "Which channels to smoke-test"
        required: true
        type: choice
        default: all
        options:
          - all
          - homebrew
          - windows

permissions:
  contents: read

env:
  AX_CODE_DISABLE_AUTOUPDATE: "1"
  AX_CODE_DISABLE_AUTO_INDEX: "1"
  AX_CODE_DISABLE_LSP_DOWNLOAD: "1"
  AX_CODE_DISABLE_MODELS_FETCH: "1"
  AX_CODE_DISABLE_PROJECT_CONFIG: "1"

jobs:
  homebrew:
    name: macos-latest / homebrew
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate manual dispatch inputs
        shell: bash
        run: bash .github/scripts/validate-install-matrix-inputs.sh "${{ inputs.version }}" "${{ inputs.channel }}"

      - name: Set isolated home paths
        shell: bash
        run: |
          bash .github/scripts/set-isolated-home-env.sh "$RUNNER_TEMP/ax-code-homebrew-smoke-home"

      - name: Resolve version under test
        id: version
        shell: bash
        run: bash .github/scripts/resolve-version-for-workflow.sh "$GITHUB_OUTPUT" "${{ inputs.version }}"

      - name: Filter dispatch channel
        id: channel
        shell: bash
        run: bash .github/scripts/filter-dispatch-channel.sh "$GITHUB_OUTPUT" "${{ inputs.channel }}" "homebrew" "homebrew smoke"

      - name: Install ax-code from Homebrew tap
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for Homebrew tap formula ax-code ${VERSION}..."
          # Initial update to bring local tap state up to date.
          brew update 2>&1 || true
          for attempt in $(seq 1 180); do
            # Re-fetch the tap on each attempt so brew info reflects the
            # latest formula. brew tap on an already-tapped tap runs git pull;
            # suppress output but allow it to fail (broken-pipe on CI runners
            # can exit non-zero without affecting the formula state).
            brew tap defai-digital/ax-code 2>&1 || true
            # Avoid `grep -q` under pipefail; Homebrew can continue writing
            # after grep matches, turning a real match into a SIGPIPE failure.
            BREW_INFO="$(brew info defai-digital/ax-code/ax-code 2>&1 || true)"
            if [[ "$BREW_INFO" == *"stable ${VERSION}"* ]]; then
              echo "Homebrew formula ${VERSION} is available (attempt ${attempt})"
              break
            fi
            if [ "$attempt" = "180" ]; then
              echo "FAIL: Homebrew formula did not converge to ${VERSION} after 30 minutes"
              echo "$BREW_INFO"
              exit 1
            fi
            sleep 10
          done
          brew install defai-digital/ax-code/ax-code

      - name: ax-code --version
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash .github/scripts/assert-ax-code-version.sh "$VERSION"

      - name: ax-code doctor - assert Homebrew runtime is node-bundled
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: bash
        run: |
          OUTPUT="$(ax-code doctor 2>&1)"
          echo "$OUTPUT"
          echo "$OUTPUT" | bash .github/scripts/assert-runtime-mode.sh "homebrew" doctor

      - name: Desktop cask coexistence - formula stays linked
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -e
          # Regression guard for issue #342: a Desktop cask sharing the CLI
          # formula's token makes Homebrew skip linking the formula, leaving
          # no ax-code command after upgrades. The cask must install under a
          # distinct token and the CLI must stay resolvable next to it.
          brew tap defai-digital/ax-code-desktop 2>&1 || true
          brew install --cask defai-digital/ax-code-desktop/ax-code-desktop
          # Query the installed-token list directly. `brew list --cask ax-code`
          # follows cask_renames.json, so the intentional ax-code ->
          # ax-code-desktop migration makes that command succeed even though
          # the installed token is correctly distinct.
          if brew list --cask | grep -Fx "ax-code"; then
            echo "FAIL: a cask named ax-code is installed; it collides with the CLI formula token"
            exit 1
          fi
          command -v ax-code
          ax-code --version

      - name: Smoke - installed backend stdio handshake
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: bash
        timeout-minutes: 1
        run: |
          set -e
          OUTPUT="$(printf '{"type":"rpc.request","method":"health","id":1}\n' | ax-code tui-backend --stdio 2>&1)"
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -E '"type":"rpc.result".*"id":1' \
            || (echo "FAIL: Homebrew installed backend did not return rpc health result" && exit 1)
          echo "$OUTPUT" | bash .github/scripts/assert-runtime-mode.sh "homebrew" backend

  windows:
    name: ${{ matrix.label }} / windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            label: windows-x64
          - os: windows-11-arm
            label: windows-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate manual dispatch inputs
        shell: bash
        run: bash .github/scripts/validate-install-matrix-inputs.sh "${{ inputs.version }}" "${{ inputs.channel }}"

      - name: Set isolated home paths
        shell: bash
        run: |
          bash .github/scripts/set-isolated-home-env.sh "$RUNNER_TEMP/ax-code-windows-smoke-home"

      - name: Resolve version under test
        id: version
        shell: bash
        run: bash .github/scripts/resolve-version-for-workflow.sh "$GITHUB_OUTPUT" "${{ inputs.version }}"

      - name: Filter dispatch channel
        id: channel
        shell: bash
        run: bash .github/scripts/filter-dispatch-channel.sh "$GITHUB_OUTPUT" "${{ inputs.channel }}" "windows" "Windows PowerShell installer"

      - name: Setup Node.js runtime
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        uses: actions/setup-node@v7
        with:
          node-version: "26"

      - name: Install minisign for release verification
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Pinned official win64 binary (runs natively on x64; under emulation on arm64 runners).
          $MinisignVersion = "0.12"
          $MinisignZipUrl = "https://github.com/jedisct1/minisign/releases/download/$MinisignVersion/minisign-$MinisignVersion-win64.zip"
          $MinisignDir = Join-Path $env:RUNNER_TEMP "minisign"
          $MinisignZip = Join-Path $env:RUNNER_TEMP "minisign-win64.zip"
          New-Item -ItemType Directory -Force -Path $MinisignDir | Out-Null
          Invoke-WebRequest -Uri $MinisignZipUrl -OutFile $MinisignZip -UseBasicParsing
          Expand-Archive -Path $MinisignZip -DestinationPath $MinisignDir -Force
          $MinisignExe = Get-ChildItem -Path $MinisignDir -Filter "minisign.exe" -Recurse | Select-Object -First 1
          if (-not $MinisignExe) {
            throw "minisign.exe not found after extracting $MinisignZipUrl"
          }
          $BinDir = Split-Path -Parent $MinisignExe.FullName
          "$BinDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:Path = "$BinDir;$env:Path"
          Write-Host "Installed minisign at $($MinisignExe.FullName)"
          if (-not (Get-Command minisign -ErrorAction SilentlyContinue)) {
            throw "minisign is not resolvable on PATH after install"
          }

      - name: Install ax-code from PowerShell release installer
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Version = "${{ steps.version.outputs.version }}"
          $Installer = Join-Path $env:RUNNER_TEMP "install.ps1"
          $InstallerSig = "$Installer.minisig"
          $Base = "https://github.com/${{ github.repository }}/releases/download/v$Version"
          Invoke-WebRequest -Uri "$Base/install.ps1" -OutFile $Installer -UseBasicParsing
          Invoke-WebRequest -Uri "$Base/install.ps1.minisig" -OutFile $InstallerSig -UseBasicParsing
          # Prefer the checked-in public key from this checkout when available.
          $PublicKeyFile = Join-Path $env:GITHUB_WORKSPACE "docs/release/ax-minisign.pub"
          if (Test-Path -LiteralPath $PublicKeyFile -PathType Leaf) {
            & minisign -V -p $PublicKeyFile -m $Installer -x $InstallerSig
            if ($LASTEXITCODE -ne 0) { throw "install.ps1 minisign verification failed" }
          } else {
            $Key = "RWSlDu++afxCz01OqhYWhfo8+L8pVbSYXJBEb2zoWBuK0WACIzbGVZRO"
            & minisign -Vm $Installer -x $InstallerSig -P $Key
            if ($LASTEXITCODE -ne 0) { throw "install.ps1 minisign verification failed" }
          }
          & $Installer -Version $Version
          $Resolved = (Get-Command ax-code -ErrorAction Stop).Source
          Write-Host "Resolved ax-code to $Resolved"
          $ExpectedCmd = Join-Path $HOME ".ax-code\bin\ax-code.cmd"
          $ExpectedExe = Join-Path $HOME ".ax-code\bin\ax-code.exe"
          if (($Resolved -ine $ExpectedCmd) -and ($Resolved -ine $ExpectedExe)) {
            throw "expected installer-linked ax-code at $ExpectedCmd or $ExpectedExe, got $Resolved"
          }
          $Output = (ax-code --version).Trim()
          Write-Host $Output
          if ($Output -ne $Version -and $Output -ne "v$Version") {
            throw "expected installer-linked ax-code --version to be $Version, got $Output"
          }
          "$HOME\.ax-code\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: ax-code --version
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.version }}"
          $Output = (ax-code --version).Trim()
          Write-Host $Output
          if ($Output -ne $Version -and $Output -ne "v$Version") {
            throw "expected ax-code --version to be $Version, got $Output"
          }

      - name: ax-code doctor - assert Windows runtime is Node bundled
        if: ${{ steps.channel.outputs.enabled == 'true' }}
        shell: pwsh
        run: |
          $Output = (ax-code doctor 2>&1 | Out-String)
          Write-Host $Output
          if ($Output -notmatch 'Runtime: Node .* \(node-bundled\)') {
            throw "Windows install did not report node-bundled runtimeMode"
          }
