name: codeql

on:
  pull_request:
    paths:
      - ".github/workflows/codeql.yml"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "crates/**"
      - "desktop/**"
      - "package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "script/**"
      - "tools/**"
      - "turbo.json"
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/codeql.yml"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "crates/**"
      - "desktop/**"
      - "package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "script/**"
      - "tools/**"
      - "turbo.json"
  schedule:
    - cron: "23 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  javascript-typescript-actions:
    name: JavaScript, TypeScript, and Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript,actions
          queries: +security-extended,security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript-actions"

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          queries: +security-extended,security-and-quality
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
