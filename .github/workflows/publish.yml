name: Publish Beta

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      AX_CODE_CHANNEL: beta
      AX_CODE_BUMP: ${{ inputs.bump }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --dir packages/ax-code run typecheck

      - name: Test
        run: pnpm --dir packages/ax-code run test:ci -- deterministic
        env:
          AX_CODE_DISABLE_SHARE: "true"

      - name: Publish
        run: bun script/publish.ts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AX_CODE_RELEASE: "true"
