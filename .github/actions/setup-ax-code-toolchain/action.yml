name: Setup Ax-code JS toolchain
description: Shared Node.js + pnpm toolchain bootstrap for workflows

inputs:
  node-version:
    # 26 provides node:ffi (--experimental-ffi), required by the OpenTUI Node
    # backend that the node-bundled build/smoke exercises.
    description: Node.js version
    required: false
    default: "26"
  pnpm-version:
    description: pnpm/action-setup version
    required: false
    default: "10.33.4"
  registry-url:
    description: Node.js npm registry URL
    required: false
    default: "https://registry.npmjs.org"
  checkout:
    description: Whether to run actions/checkout
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v7

    - name: Setup pnpm
      shell: bash
      run: npm install -g pnpm@${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
