name: Setup Ax-code JS toolchain
description: Shared JS/Bun toolchain bootstrap for workflows

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "22"
  pnpm-version:
    description: pnpm/action-setup version
    required: false
    default: "10.33.4"
  bun-version:
    description: Bun version
    required: false
    default: "1.3.14"
  registry-url:
    description: Node.js npm registry URL
    required: false
    default: "https://registry.npmjs.org"
  checkout:
    description: Whether to run actions/checkout
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v6

    - name: Setup pnpm
      shell: bash
      run: npm install -g pnpm@${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}
