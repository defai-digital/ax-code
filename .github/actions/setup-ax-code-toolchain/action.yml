name: Setup Ax-code JS toolchain
description: Shared JS/Bun toolchain bootstrap for workflows

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "22"
  pnpm-version:
    description: pnpm/action-setup version
    required: false
    default: "10.33.4"
  bun-version:
    description: Bun version
    required: false
    default: "1.3.14"
  checkout:
    description: Whether to run actions/checkout
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}
