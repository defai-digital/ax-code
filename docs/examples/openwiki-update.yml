# Example: scheduled OpenWiki documentation update PR
#
# Copy into .github/workflows/openwiki-update.yml (or adapt for GitLab/Bitbucket).
# Requires model credentials for OpenWiki in repository secrets.
#
# See also: https://github.com/langchain-ai/openwiki
# AX Code guide: docs/wiki.md

name: openwiki-update

on:
  schedule:
    # Daily 06:00 UTC — adjust as needed
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install -g openwiki

      - name: Configure OpenWiki env
        # Map your provider secrets into the names OpenWiki expects.
        # Example uses OpenRouter; change for Anthropic/OpenAI/etc.
        run: |
          mkdir -p "$HOME/.openwiki"
          cat > "$HOME/.openwiki/.env" <<EOF
          OPENWIKI_PROVIDER=${{ secrets.OPENWIKI_PROVIDER || 'openrouter' }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID=${{ secrets.OPENWIKI_MODEL_ID }}
          EOF

      - name: Update wiki (non-interactive)
        # OpenWiki creates openwiki/ if missing; --print avoids interactive chat.
        run: openwiki code --update --print
        env:
          # Prefer secrets over writing .env when possible
          OPENWIKI_PROVIDER: ${{ secrets.OPENWIKI_PROVIDER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID: ${{ secrets.OPENWIKI_MODEL_ID }}

      - name: Ensure AGENTS markers (optional, requires ax-code on PATH)
        # If ax-code is available in CI, keep OPENWIKI markers in AGENTS.md in sync.
        # Otherwise rely on OpenWiki's own AGENTS/CLAUDE marker updates.
        run: |
          if command -v ax-code >/dev/null 2>&1; then
            ax-code wiki ensure-agents
            ax-code wiki cards || true
          else
            echo "ax-code not installed; skipping ensure-agents / cards"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs(wiki): refresh OpenWiki repository wiki"
          title: "docs(wiki): refresh OpenWiki repository wiki"
          body: |
            Automated OpenWiki documentation update.

            - Regenerated / updated `openwiki/` from the current branch
            - Review for accuracy before merge (wiki is LLM synthesis)

            Generated by `.github/workflows/openwiki-update.yml` (from `docs/examples/openwiki-update.yml`).
          branch: chore/openwiki-update
          delete-branch: true
          add-paths: |
            openwiki/**
            AGENTS.md
            CLAUDE.md
            .ax-code/wiki-cards.md
